name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  TARGET: x86_64-unknown-linux-musl
  ASSET: oc-route-x86_64-linux

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl
      - name: Install musl toolchain
        run: sudo apt-get update && sudo apt-get install --yes musl-tools
      - name: Build static ELF
        run: cargo build --locked --release --target "$TARGET"
      - name: Verify the only release asset
        run: |
          install -m755 "target/$TARGET/release/oc-route" "$ASSET"
          file "$ASSET" | tee /dev/stderr | grep -Eq 'ELF.*(statically linked|static-pie linked)'
          test "$(find . -maxdepth 1 -type f -name 'oc-route-x86_64-linux' | wc -l)" -eq 1
          ./$ASSET --version
      - name: Create prerelease
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          gh release create "$GITHUB_REF_NAME" "$ASSET"
          --verify-tag
          --prerelease
          --generate-notes
          --title "oc-route $GITHUB_REF_NAME"
